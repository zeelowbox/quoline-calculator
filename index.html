<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quoline — 配合計算</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f5f4f0;
  --white:   #ffffff;
  --border:  #dedad2;
  --border2: #c8c3b8;
  --text:    #1a1918;
  --muted:   #8a8680;
  --light:   #edebe6;
  --shadow:  0 4px 24px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.11);

  /* クオライン ブランドカラー（商品画像に合わせた正確な色） */
  --q280:  #1a8fa0;  /* ティール */
  --q250:  #1e8a5a;  /* グリーン */
  --q200:  #9a7a28;  /* ゴールドブラウン */
  --q130:  #b82868;  /* マゼンタ/ピンク */
  --q110:  #6a1a3a;  /* バーガンディ */
  --q100:  #8a1a2a;  /* ダークレッド */
  --q80:   #2a4a9a;  /* ブルー */
  --q50:   #b84820;  /* テラコッタ */
  --q0:    #7a7a82;  /* グレー */

  --tga-c: #c0392b;
  --cys-c: #1a6a2a;
  --cam-c: #1a4a8a;
  --dtd-c: #6a6a6a;

  --serif: 'Cormorant Garamond', serif;
  --sans:  'Noto Sans JP', sans-serif;
  --mono:  'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding-bottom: 80px; }

/* ── ヘッダー ── */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 28px 20px 20px;
  text-align: center;
}
.header-brand {
  font-family: var(--serif);
  font-size: 11px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.header-logo {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 300;
  letter-spacing: .14em;
  color: var(--text);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.header-logo-q {
  font-size: 42px;
  font-weight: 600;
  color: var(--q280);
  line-height: 1;
}
.header-rule { width: 36px; height: 1.5px; background: var(--q280); margin: 8px auto 6px; }
.header-sub  { font-size: 9px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); }

/* ── メイン ── */
.main { max-width: 640px; margin: 0 auto; padding: 24px 16px 0; }

/* ── セクションラベル ── */
.sec-label {
  font-size: 10px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── 薬剤カード グリッド ── */
.drug-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}
@media(max-width:480px){ .drug-grid { grid-template-columns: repeat(3,1fr); gap:6px; } }

.drug-card {
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 10px 8px 9px;
  cursor: pointer;
  transition: all .18s;
  position: relative;
  text-align: center;
  user-select: none;
}
.drug-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

.drug-card.selected {
  border-color: var(--card-color);
  background: var(--white);
  box-shadow: 0 4px 20px rgba(0,0,0,0.13);
}
.drug-card.selected .drug-card-q { color: var(--white); background: var(--card-color); }

.drug-card-q {
  width: 36px; height: 36px;
  border-radius: 6px;
  background: var(--light);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 15px; font-weight: 600;
  color: var(--card-color);
  margin: 0 auto 6px;
  transition: all .18s;
  line-height: 1;
}
.drug-card-name {
  font-size: 11px; font-weight: 700; color: var(--text);
  margin-bottom: 3px; line-height: 1.2;
}
.drug-card-conc {
  font-family: var(--mono); font-size: 11px; color: var(--card-color); font-weight: 500;
}
.drug-card-badge {
  position: absolute; top: 5px; right: 5px;
  font-size: 9px; font-weight: 700;
  background: var(--card-color); color: var(--white);
  border-radius: 10px; padding: 1px 5px;
  opacity: 0; transition: opacity .15s;
}
.drug-card.selected .drug-card-badge { opacity: 1; }

/* ── 選択済みスロット ── */
.slots-area { margin-bottom: 20px; }
.slot-row {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.slot-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.slot-name { flex: 1; font-size: 12px; font-weight: 700; }
.slot-conc { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.slot-remove {
  background: none; border: none; color: var(--muted);
  font-size: 16px; cursor: pointer; padding: 0 4px;
  transition: color .15s; flex-shrink: 0;
}
.slot-remove:hover { color: #c0392b; }
.slot-ratio-input {
  width: 52px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 4px; padding: 6px 8px;
  font-family: var(--mono); font-size: 16px; font-weight: 500;
  text-align: center; outline: none; transition: border-color .15s;
  color: var(--text);
}
.slot-ratio-input:focus { border-color: var(--q280); }
.slot-colon { font-family: var(--mono); font-size: 14px; color: var(--muted); flex-shrink: 0; }

.empty-slots {
  background: var(--white); border: 2px dashed var(--border);
  border-radius: 8px; padding: 24px;
  text-align: center; color: var(--muted); font-size: 12px; line-height: 1.8;
}
.empty-slots-icon { font-size: 28px; margin-bottom: 6px; opacity: .4; }

/* ── 総量入力 ── */
.input-field {
  background: var(--white); border: 2px solid var(--border);
  border-radius: 8px; padding: 16px 18px 14px;
  margin-bottom: 20px; transition: border-color .15s;
}
.input-field:focus-within { border-color: var(--q280); box-shadow: 0 0 0 3px rgba(26,143,160,.1); }
.input-field label {
  display: block; font-size: 10px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.input-row { display: flex; align-items: baseline; gap: 6px; }
.input-row input {
  flex: 1; background: none; border: none; color: var(--text);
  font-family: var(--mono); font-size: 28px; font-weight: 500;
  outline: none; min-width: 0;
}
.input-row input::placeholder { color: #ddd; }
.input-unit { font-family: var(--mono); font-size: 14px; color: var(--muted); }

/* ── 計算ボタン ── */
.calc-btn {
  width: 100%; background: var(--text); color: var(--white);
  border: none; border-radius: 8px; padding: 16px;
  font-family: var(--sans); font-size: 13px; font-weight: 700;
  letter-spacing: .1em; cursor: pointer; transition: all .18s;
  margin-bottom: 20px;
}
.calc-btn:hover { background: var(--q280); }
.calc-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── 結果パネル ── */
.result-panel {
  border: 2px solid var(--border); border-radius: 10px;
  overflow: hidden; margin-bottom: 20px;
  display: none; opacity: 0; transform: translateY(8px);
  transition: opacity .3s, transform .3s;
}
.result-panel.visible { display: block; }
.result-panel.show { opacity: 1; transform: translateY(0); }
.result-panel.has-error { border-color: #e0a0a0; }

/* 結果ヒーロー */
.result-hero {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 2px; background: var(--border);
}
@media(max-width:400px){ .result-hero { grid-template-columns: 1fr; } }

.rhc { background: var(--white); padding: 18px 20px; }
.rhc-label { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.rhc-val { font-family: var(--mono); font-size: 34px; font-weight: 500; line-height: 1; }
.rhc-unit { font-size: 13px; color: var(--muted); margin-left: 4px; }

/* 各剤量 */
.amounts-grid {
  background: #fafaf8;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
@media(max-width:400px){ .amounts-grid { grid-template-columns: 1fr; } }

.amt-item { background: var(--white); border-radius: 6px; padding: 10px 12px; border: 1px solid var(--border); }
.amt-label { font-size: 10px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
.amt-val { font-family: var(--mono); font-size: 18px; font-weight: 500; }
.amt-unit { font-size: 11px; color: var(--muted); margin-left: 2px; }
.amt-ratio { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* 成分濃度 */
.conc-grid {
  display: grid; grid-template-columns: repeat(2,1fr);
  gap: 2px; background: var(--border);
  border-top: 2px solid var(--border);
}
@media(max-width:400px){ .conc-grid { grid-template-columns: 1fr; } }

.ci { background: var(--white); padding: 12px 16px; }
.ci-label { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 5px; }
.ci-val { font-family: var(--mono); font-size: 20px; font-weight: 500; }
.ci-unit { font-size: 10px; color: var(--muted); margin-left: 2px; }

/* 総還元値（メイン） */
.total-conc-banner {
  background: var(--text); padding: 20px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.tcb-label { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.6); }
.tcb-val { font-family: var(--mono); font-size: 40px; font-weight: 500; color: var(--white); line-height: 1; }
.tcb-unit { font-size: 14px; color: rgba(255,255,255,.5); margin-left: 4px; }

.error-box { background: #fff5f5; border-top: 3px solid #e07070; padding: 16px 20px; font-size: 12px; color: #c0392b; line-height: 1.7; }

/* ── 注記 ── */
.note { font-size: 10px; color: var(--muted); line-height: 1.9; border-top: 1px solid var(--border); padding-top: 16px; margin-top: 4px; }

/* ── リセットボタン ── */
.reset-btn {
  width: 100%; background: none; border: 1.5px solid var(--border);
  border-radius: 6px; padding: 11px; color: var(--muted);
  font-size: 12px; font-weight: 700; letter-spacing: .08em;
  cursor: pointer; transition: all .15s; margin-bottom: 16px;
}
.reset-btn:hover { border-color: var(--text); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="header-brand">Arimino</div>
  <div class="header-logo">
    <span class="header-logo-q">Q</span>uoline
  </div>
  <div class="header-rule"></div>
  <div class="header-sub">Reducer Concentration Calculator</div>
</header>

<div class="main">

  <!-- ① 薬剤選択 -->
  <div class="sec-label" style="margin-top:4px">STEP 1　薬剤を選択（最大4剤）</div>
  <div class="drug-grid" id="drug-grid"></div>

  <!-- ② 選択スロット & 比率 -->
  <div class="sec-label">STEP 2　混合比率を入力</div>
  <div class="slots-area" id="slots-area">
    <div class="empty-slots">
      <div class="empty-slots-icon">💊</div>
      上のカードから薬剤を選択してください<br>最大4剤まで選べます
    </div>
  </div>

  <!-- ③ 総量 -->
  <div class="sec-label">STEP 3　仕上がり総量を入力</div>
  <div class="input-field">
    <label>仕上がり総量</label>
    <div class="input-row">
      <input type="number" id="total-inp" placeholder="100" min="1" oninput="onInput()">
      <span class="input-unit">g</span>
    </div>
  </div>

  <!-- 計算ボタン -->
  <button class="calc-btn" id="calc-btn" onclick="calculate()" disabled>計算する</button>
  <button class="reset-btn" onclick="resetAll()">✕ リセット</button>

  <!-- 結果 -->
  <div class="result-panel" id="result-panel">
    <div id="err-box" class="error-box" style="display:none"></div>
    <div id="ok-box">
      <div class="total-conc-banner">
        <div>
          <div class="tcb-label">総還元剤濃度</div>
          <div><span class="tcb-val" id="res-total-conc">—</span><span class="tcb-unit">%</span></div>
        </div>
      </div>
      <div class="amounts-grid" id="amounts-grid"></div>
      <div class="conc-grid">
        <div class="ci">
          <div class="ci-label" style="color:var(--tga-c)">チオグリコール酸</div>
          <div class="ci-val" style="color:var(--tga-c)"><span id="res-tga">—</span><span class="ci-unit">%</span></div>
        </div>
        <div class="ci">
          <div class="ci-label" style="color:var(--cys-c)">システイン</div>
          <div class="ci-val" style="color:var(--cys-c)"><span id="res-cys">—</span><span class="ci-unit">%</span></div>
        </div>
        <div class="ci">
          <div class="ci-label" style="color:var(--cam-c)">システアミン</div>
          <div class="ci-val" style="color:var(--cam-c)"><span id="res-cam">—</span><span class="ci-unit">%</span></div>
        </div>
        <div class="ci">
          <div class="ci-label" style="color:var(--dtd-c)">DTDG</div>
          <div class="ci-val" style="color:var(--dtd-c)"><span id="res-dtd">—</span><span class="ci-unit">%</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="note">
    ※ 有効成分濃度は医薬部外品規定に基づく推計値を含みます。<br>
    ※ 正確な処方は必ず製品資料・メーカー指示に従ってください。<br>
    ※ 本ツールは還元剤濃度の参考計算を目的としています。
  </div>
</div>

<script>
// ================================================================
// 薬剤マスタ
// ================================================================
const DRUGS = [
  { id:'q280', name:'T-280',      tga:10.7, cys:0,   cam:0,   dtd:0,   color:'#1a8fa0', bg:'#1a8fa0', label:'280' },
  { id:'q250', name:'T-C 250',    tga:9.0,  cys:1.7, cam:0,   dtd:0,   color:'#1e8a5a', bg:'#1e8a5a', label:'250' },
  { id:'q200', name:'CA-T 200',   tga:2.0,  cys:0,   cam:5.0, dtd:0,   color:'#9a7a28', bg:'#9a7a28', label:'200' },
  { id:'q130', name:'CA-C 130',   tga:0,    cys:2.0, cam:5.0, dtd:0,   color:'#b82868', bg:'#b82868', label:'130' },
  { id:'q110', name:'CA-C 110',   tga:0,    cys:2.0, cam:5.0, dtd:0,   color:'#6a1a3a', bg:'#6a1a3a', label:'110' },
  { id:'q100', name:'CA-T-C 100', tga:0,    cys:1.0, cam:4.0, dtd:0,   color:'#8a1a2a', bg:'#8a1a2a', label:'100' },
  { id:'q80',  name:'T-C 80',     tga:4.0,  cys:1.0, cam:0,   dtd:0,   color:'#2a4a9a', bg:'#2a4a9a', label:'80'  },
  { id:'q50',  name:'T-C 50',     tga:1.0,  cys:0.9, cam:0,   dtd:0,   color:'#b84820', bg:'#b84820', label:'50'  },
  { id:'q0',   name:'アジャストゼロ', tga:0, cys:0,  cam:0,   dtd:1.0, color:'#7a7a82', bg:'#7a7a82', label:'0'   },
];

function tot(d){ return d.tga + d.cys + d.cam + d.dtd; }

// ================================================================
// 状態
// ================================================================
let selected = []; // { drug, ratio }
const MAX = 4;

// ================================================================
// 薬剤カード描画
// ================================================================
function renderDrugGrid(){
  const el = document.getElementById('drug-grid');
  el.innerHTML = DRUGS.map(d => {
    const isSel = selected.some(s => s.drug.id === d.id);
    const selIdx = selected.findIndex(s => s.drug.id === d.id);
    const totalConc = tot(d);
    return `
    <div class="drug-card ${isSel?'selected':''}"
         style="--card-color:${d.color}"
         onclick="toggleDrug('${d.id}')">
      <div class="drug-card-badge">${selIdx>=0 ? selIdx+1 : ''}</div>
      <div class="drug-card-q">${d.label}</div>
      <div class="drug-card-name">${d.name}</div>
      <div class="drug-card-conc">${totalConc.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

// ================================================================
// 薬剤スロット描画
// ================================================================
function renderSlots(){
  const el = document.getElementById('slots-area');
  if(selected.length === 0){
    el.innerHTML = `<div class="empty-slots">
      <div class="empty-slots-icon">💊</div>
      上のカードから薬剤を選択してください<br>最大4剤まで選べます
    </div>`;
    return;
  }
  el.innerHTML = selected.map((s, i) => {
    const colon = i < selected.length-1 ? `<span class="slot-colon">：</span>` : '';
    return `
    <div class="slot-row">
      <div class="slot-dot" style="background:${s.drug.color}"></div>
      <div class="slot-name">${s.drug.name}</div>
      <div class="slot-conc">${tot(s.drug).toFixed(1)}%</div>
      <input type="number" class="slot-ratio-input" value="${s.ratio}"
             min="0" oninput="updateRatio(${i}, this.value)">
      ${colon}
      <button class="slot-remove" onclick="removeDrug(${i})">✕</button>
    </div>`;
  }).join('');
}

function toggleDrug(id){
  const drug = DRUGS.find(d => d.id === id);
  if(!drug) return;
  const idx = selected.findIndex(s => s.drug.id === id);
  if(idx >= 0){
    selected.splice(idx, 1);
  } else {
    if(selected.length >= MAX){ showToast(`最大${MAX}剤までです`); return; }
    selected.push({ drug, ratio: 1 });
  }
  renderDrugGrid();
  renderSlots();
  updateCalcBtn();
  resetResult();
}

function removeDrug(i){
  selected.splice(i, 1);
  renderDrugGrid();
  renderSlots();
  updateCalcBtn();
  resetResult();
}

function updateRatio(i, val){
  selected[i].ratio = parseFloat(val) || 0;
  resetResult();
}

function onInput(){ updateCalcBtn(); resetResult(); }

function updateCalcBtn(){
  const T = parseFloat(document.getElementById('total-inp').value);
  const btn = document.getElementById('calc-btn');
  btn.disabled = !(selected.length >= 2 && T > 0);
}

// ================================================================
// 計算
// ================================================================
function calculate(){
  const T = parseFloat(document.getElementById('total-inp').value);
  if(!T || T <= 0) return;

  const sumRatio = selected.reduce((a,s) => a + (s.ratio||0), 0);
  if(sumRatio === 0){ showErr('比率の合計が0です'); return; }

  const panel = document.getElementById('result-panel');
  const errBox = document.getElementById('err-box');
  const okBox  = document.getElementById('ok-box');
  panel.classList.add('visible');
  setTimeout(()=>panel.classList.add('show'), 10);
  errBox.style.display = 'none';
  okBox.style.display  = 'block';

  // 各剤の量
  const amounts = selected.map(s => ({
    drug: s.drug,
    ratio: s.ratio,
    amt: T * s.ratio / sumRatio,
  }));

  // 各成分の純分合計
  let pure_tga=0, pure_cys=0, pure_cam=0, pure_dtd=0;
  amounts.forEach(a => {
    pure_tga += a.amt * a.drug.tga / 100;
    pure_cys += a.amt * a.drug.cys / 100;
    pure_cam += a.amt * a.drug.cam / 100;
    pure_dtd += a.amt * a.drug.dtd / 100;
  });

  const totalConc = (pure_tga+pure_cys+pure_cam+pure_dtd) / T * 100;

  // 総還元値
  document.getElementById('res-total-conc').textContent = totalConc.toFixed(3);

  // 各剤量
  const amtGrid = document.getElementById('amounts-grid');
  amtGrid.innerHTML = amounts.map(a => `
    <div class="amt-item" style="border-left:3px solid ${a.drug.color}">
      <div class="amt-label" style="color:${a.drug.color}">${a.drug.name}</div>
      <div><span class="amt-val">${a.amt.toFixed(1)}</span><span class="amt-unit">g</span></div>
      <div class="amt-ratio">${a.ratio} / ${sumRatio} = ${(a.ratio/sumRatio*100).toFixed(0)}%</div>
    </div>`).join('');

  // 成分濃度
  document.getElementById('res-tga').textContent = (pure_tga/T*100).toFixed(3);
  document.getElementById('res-cys').textContent = (pure_cys/T*100).toFixed(3);
  document.getElementById('res-cam').textContent = (pure_cam/T*100).toFixed(3);
  document.getElementById('res-dtd').textContent = (pure_dtd/T*100).toFixed(3);

  // スクロール
  setTimeout(()=> document.getElementById('result-panel').scrollIntoView({behavior:'smooth',block:'start'}), 100);
}

function showErr(msg){
  const panel = document.getElementById('result-panel');
  const errBox = document.getElementById('err-box');
  const okBox  = document.getElementById('ok-box');
  panel.classList.add('visible','show','has-error');
  errBox.style.display = 'block';
  errBox.textContent = '⚠ ' + msg;
  okBox.style.display = 'none';
}

function resetResult(){
  const panel = document.getElementById('result-panel');
  panel.classList.remove('visible','show','has-error');
}

function resetAll(){
  selected = [];
  document.getElementById('total-inp').value = '';
  renderDrugGrid();
  renderSlots();
  resetResult();
  updateCalcBtn();
}

// ================================================================
// Toast
// ================================================================
function showToast(msg){
  let el = document.getElementById('toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'toast';
    el.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1918;color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  el.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(20px)'; }, 2000);
}

// ================================================================
// 初期化
// ================================================================
renderDrugGrid();
renderSlots();
</script>
</body>
</html>
